<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptum | Editor Minimalista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:    #e8e4df;
            --page:  #fcfaf7;
            --shadow: 0 2px 16px rgba(0,0,0,0.13);
            --fg:    #2c2c2c;
            --font:  'Courier Prime','Courier New',monospace;
            --cur:   #d44;
        }
        body.dark {
            --bg:    #1a1a1a;
            --page:  #212121;
            --shadow: 0 2px 24px rgba(0,0,0,0.5);
            --fg:    #e0e0e0;
            --cur:   #bb86fc;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body,html{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);transition:background .4s,color .4s;}

        /* Menu */
        #menu{position:fixed;top:0;left:0;width:100%;display:flex;gap:4px;padding:10px 20px;z-index:100;background:linear-gradient(to bottom,var(--bg) 60%,transparent);}
        .mbtn{background:none;border:none;color:var(--fg);font-family:var(--font);font-size:.85rem;padding:4px 12px;cursor:pointer;opacity:.75;transition:opacity .2s;letter-spacing:.05em;}
        .mbtn:hover{opacity:1;}
        .mitem{position:relative;}
        .drop{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--page);border:1px solid var(--fg);min-width:210px;flex-direction:column;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.1);}
        .drop.open{display:flex;}
        .drop button{background:none;border:none;color:var(--fg);font-family:var(--font);font-size:.82rem;padding:9px 16px;text-align:left;cursor:pointer;opacity:.75;display:flex;justify-content:space-between;gap:24px;transition:opacity .15s,background .15s;}
        .drop button:hover{opacity:1;background:rgba(128,128,128,.1);}
        .sep{height:1px;background:currentColor;opacity:.15;margin:2px 0;}

        /* Página */
        #wrap{padding-top:48px;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
        #page{width:21cm;max-width:95vw;min-height:29.7cm;background:var(--page);box-shadow:var(--shadow);margin:24px 0 60px;transition:background .4s,box-shadow .4s;}
        #editor{padding:2.5cm 2.5cm 2.5cm 2cm;min-height:29.7cm;outline:none;font-size:1.15rem;line-height:1.7;white-space:pre-wrap;word-wrap:break-word;caret-color:var(--cur);}

        /* Contador */
        #strig{position:fixed;bottom:0;right:0;width:150px;height:80px;z-index:10;}
        #stats{position:fixed;bottom:20px;right:30px;font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none;}
        #strig:hover #stats{opacity:.5;}

        /* Modal */
        #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center;z-index:500;}
        #mbox{background:var(--page);color:var(--fg);font-family:var(--font);padding:36px 40px;max-width:380px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18);}
        #mbox h2{font-size:1.5rem;letter-spacing:.08em;margin-bottom:4px;}
        #mbox .sub{font-size:.78rem;opacity:.5;margin-bottom:20px;}
        #mbox p{font-size:.88rem;line-height:1.8;opacity:.85;}
        #mbox .lbl{opacity:.5;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;}
        #mbox a{color:var(--fg);opacity:.6;font-size:.82rem;}
        #mbox a:hover{opacity:1;}
        #mclose{margin-top:24px;background:none;border:1px solid currentColor;color:var(--fg);font-family:var(--font);font-size:.82rem;padding:6px 28px;cursor:pointer;opacity:.6;letter-spacing:.05em;transition:opacity .2s;}
        #mclose:hover{opacity:1;}
    </style>
</head>
<body>

<nav id="menu">
    <div class="mitem">
        <button class="mbtn" id="bArq">Arquivo</button>
        <div class="drop" id="dArq">
            <button onmousedown="arq(event,'novo')">Novo <small>Ctrl+N</small></button>
            <button onmousedown="arq(event,'abrir')">Abrir... <small>Ctrl+O</small></button>
            <div class="sep"></div>
            <button onmousedown="arq(event,'salvar')">Salvar <small>Ctrl+S</small></button>
            <button onmousedown="arq(event,'salvaras')">Salvar como...</button>
            <div class="sep"></div>
            <button onmousedown="arq(event,'sobre')">Sobre o Scriptum...</button>
        </div>
    </div>
    <div class="mitem">
        <button class="mbtn" id="bEdt">Editar</button>
        <div class="drop" id="dEdt">
            <button onmousedown="edt(event,'desfazer')">Desfazer <small>Ctrl+Z</small></button>
            <button onmousedown="edt(event,'refazer')">Refazer <small>Ctrl+Y</small></button>
            <div class="sep"></div>
            <button onmousedown="edt(event,'copiar')">Copiar <small>Ctrl+C</small></button>
            <button onmousedown="edt(event,'colar')">Colar <small>Ctrl+V</small></button>
            <button onmousedown="edt(event,'sel')">Selecionar tudo <small>Ctrl+A</small></button>
            <div class="sep"></div>
            <button onmousedown="edt(event,'dark')">Modo escuro <small>Ctrl+D</small></button>
            <button onmousedown="edt(event,'full')">Tela cheia <small>Ctrl+F</small></button>
        </div>
    </div>
    <button class="mbtn" onmousedown="fin(event)">Finalizar</button>
</nav>

<div id="wrap">
    <div id="page">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>
</div>

<div id="strig"><div id="stats"><span id="wc">0</span> palavras</div></div>
<input type="file" id="finput" accept=".txt,.md" style="display:none">

<div id="modal">
    <div id="mbox">
        <h2>Scriptum</h2>
        <div class="sub">Editor Minimalista &mdash; v1.0</div>
        <div class="sep"></div>
        <p class="lbl">Autor</p>
        <p>Prof. Adagenor Lobato Ribeiro</p>
        <p>Universidade Federal do Par&aacute;</p>
        <p>N&uacute;cleo de Altos Estudos Amaz&ocirc;nicos</p>
        <p>Faculdade de Computa&ccedil;&atilde;o &mdash; ICEN</p>
        <div class="sep"></div>
        <p><a href="mailto:adagenor.ribeiro&#64;gmail.com">adagenor.ribeiro&#64;gmail.com</a></p>
        <button id="mclose" onmousedown="fechaModal(event)">Fechar</button>
    </div>
</div>

<script>
var ed    = document.getElementById('editor');
var wc    = document.getElementById('wc');
var dArq  = document.getElementById('dArq');
var dEdt  = document.getElementById('dEdt');
var bArq  = document.getElementById('bArq');
var bEdt  = document.getElementById('bEdt');
var nome  = 'meu-texto.txt';
var ssel  = null;
var timer;

// Carregar
window.onload = function() {
    var s = localStorage.getItem('scriptum_data');
    if (s) { ed.innerText = s; stats(); }
    ed.focus();
};

// Autosave
ed.addEventListener('input', function() {
    clearTimeout(timer);
    stats();
    timer = setTimeout(salva, 5000);
});
function salva() { localStorage.setItem('scriptum_data', ed.innerText); }

// Stats
function stats() {
    var t = ed.innerText.trim();
    wc.innerText = t ? t.split(/\s+/).length : 0;
}

// Selecao
ed.addEventListener('mouseup', ss); ed.addEventListener('keyup', ss); ed.addEventListener('blur', ss);
function ss() { var s=window.getSelection(); if(s&&s.rangeCount) ssel=s.getRangeAt(0).cloneRange(); }
function rs() { ed.focus(); if(ssel){var s=window.getSelection();s.removeAllRanges();s.addRange(ssel);} }

// Dropdowns
bArq.addEventListener('mousedown', function(e){ e.preventDefault(); dEdt.classList.remove('open'); dArq.classList.toggle('open'); });
bEdt.addEventListener('mousedown', function(e){ e.preventDefault(); dArq.classList.remove('open'); dEdt.classList.toggle('open'); });
document.addEventListener('mousedown', function(e){
    if(!bArq.contains(e.target)&&!dArq.contains(e.target)) dArq.classList.remove('open');
    if(!bEdt.contains(e.target)&&!dEdt.contains(e.target)) dEdt.classList.remove('open');
});

// Menu Arquivo
function arq(e, cmd) {
    e.preventDefault();
    dArq.classList.remove('open');
    if (cmd==='novo') {
        if (ed.innerText.trim()&&!confirm('Criar novo documento?\nO texto atual sera perdido.')) return;
        ed.innerText=''; nome='meu-texto.txt'; stats(); ed.focus(); toast('Novo documento.');
    } else if (cmd==='abrir') {
        if (window.showOpenFilePicker) {
            window.showOpenFilePicker({types:[{description:'Texto',accept:{'text/plain':['.txt','.md']}}],multiple:false})
            .then(function(h){ return h[0].getFile().then(function(f){ return f.text().then(function(t){
                ed.innerText=t; nome=h[0].name; stats(); ed.focus(); toast('Aberto: '+h[0].name);
            });});}).catch(function(err){ if(err.name!=='AbortError') toast('Erro: '+err.message); });
        } else { document.getElementById('finput').click(); }
    } else if (cmd==='salvar') {
        salva(); dl(nome);
    } else if (cmd==='salvaras') {
        var n=prompt('Nome do arquivo:',nome); if(!n) return;
        n=n.trim(); if(!n.includes('.')) n+='.txt'; nome=n; salva(); dl(nome);
    } else if (cmd==='sobre') {
        document.getElementById('modal').style.display='flex';
    }
}

// Menu Editar
function edt(e, cmd) {
    e.preventDefault();
    dEdt.classList.remove('open');
    if (cmd==='desfazer') { ed.focus(); document.execCommand('undo'); stats(); }
    else if (cmd==='refazer') { ed.focus(); document.execCommand('redo'); stats(); }
    else if (cmd==='copiar') {
        rs(); var t=window.getSelection().toString();
        if(t) navigator.clipboard.writeText(t).then(function(){toast('Copiado.');}).catch(function(){document.execCommand('copy');toast('Copiado.');});
        else toast('Selecione um trecho.');
    } else if (cmd==='colar') {
        rs(); navigator.clipboard.readText().then(function(t){
            var s=window.getSelection(); if(!s.rangeCount) return;
            var r=s.getRangeAt(0); r.deleteContents();
            var n=document.createTextNode(t); r.insertNode(n);
            r.setStartAfter(n); r.setEndAfter(n); s.removeAllRanges(); s.addRange(r);
            ssel=r.cloneRange(); stats(); toast('Colado.');
        }).catch(function(){ toast('Use Ctrl+V para colar.'); });
    } else if (cmd==='sel') {
        ed.focus(); var r=document.createRange(); r.selectNodeContents(ed);
        var s=window.getSelection(); s.removeAllRanges(); s.addRange(r); ssel=r.cloneRange(); toast('Tudo selecionado.');
    } else if (cmd==='dark') { document.body.classList.toggle('dark');
    } else if (cmd==='full') {
        if(!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }
}

// Finalizar
function fin(e) {
    e.preventDefault();
    if(confirm('Deseja finalizar?\nO documento sera salvo automaticamente.')){
        salva(); window.close();
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;opacity:.5">Sessao encerrada.</div>';
    }
}

// Download
function dl(n) {
    var b=new Blob([ed.innerText],{type:'text/plain;charset=utf-8'});
    var u=URL.createObjectURL(b); var a=document.createElement('a');
    a.href=u; a.download=n; document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(u); toast('Salvo: '+n);
}

// Modal
function fechaModal(e) { if(e) e.preventDefault(); document.getElementById('modal').style.display='none'; ed.focus(); }
document.getElementById('modal').addEventListener('mousedown',function(e){ if(e.target.id==='modal') fechaModal(e); });

// Abrir fallback
document.getElementById('finput').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){ ed.innerText=ev.target.result; nome=f.name; stats(); ed.focus(); toast('Aberto: '+f.name); };
    r.readAsText(f); e.target.value='';
});

// Toast
function toast(msg) {
    var t=document.getElementById('_t');
    if(!t){ t=document.createElement('div'); t.id='_t';
        t.style.cssText='position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--page);font-family:var(--font);font-size:.8rem;padding:6px 18px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;';
        document.body.appendChild(t); }
    t.innerText=msg; t.style.opacity='.9';
    clearTimeout(t._t); t._t=setTimeout(function(){t.style.opacity='0';},2200);
}

// Teclado
document.addEventListener('keydown',function(e){
    if(e.ctrlKey&&e.key==='n'){e.preventDefault();arq(e,'novo');}
    if(e.ctrlKey&&e.key==='o'){e.preventDefault();arq(e,'abrir');}
    if(e.ctrlKey&&e.key==='s'){e.preventDefault();arq(e,'salvar');}
    if(e.ctrlKey&&e.key==='d'){e.preventDefault();edt(e,'dark');}
    if(e.ctrlKey&&e.key==='f'){e.preventDefault();edt(e,'full');}
});

// Colar puro
ed.addEventListener('paste',function(e){
    e.preventDefault(); var t=e.clipboardData.getData('text/plain');
    var s=window.getSelection(); if(!s.rangeCount) return;
    var r=s.getRangeAt(0); r.deleteContents();
    var n=document.createTextNode(t); r.insertNode(n);
    r.setStartAfter(n); r.setEndAfter(n); s.removeAllRanges(); s.addRange(r); stats();
});
</script>
</body>
</html>
