<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriptum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body, html {
    height: 100%;
    background-image: repeating-conic-gradient(#888 0% 25%, #bbb 0% 50%);
    background-size: 4px 4px;
    font-family: 'Chicago', 'Geneva', 'Charcoal', Arial, sans-serif;
    font-size: 12px;
    overflow: hidden;
}

/* Janela principal */
#window {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 860px;
    max-width: 99vw;
    height: calc(100vh - 40px);
    background: #fff;
    border: 2px solid #000;
    box-shadow: 4px 4px 0 #000;
    display: flex;
    flex-direction: column;
}

/* Barra de título */
#titlebar {
    height: 22px;
    background: #fff;
    border-bottom: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
    user-select: none;
    flex-shrink: 0;
}
#titlebar::before, #titlebar::after {
    content: '';
    position: absolute;
    top: 3px; bottom: 3px;
    width: calc(50% - 70px);
    background: repeating-linear-gradient(180deg,#000 0px,#000 1px,#fff 1px,#fff 2px);
}
#titlebar::before { left: 24px; }
#titlebar::after  { right: 24px; }
#titlebar span {
    background: #fff;
    padding: 0 10px;
    font-size: 12px;
    font-weight: bold;
    z-index: 1;
    letter-spacing: 0.5px;
}
#closebtn {
    position: absolute;
    left: 6px;
    width: 13px; height: 13px;
    border: 1.5px solid #000;
    background: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    z-index: 2;
}
#closebtn:active { background: #000; }

/* Menu bar */
#menubar {
    height: 22px;
    background: #fff;
    border-bottom: 2px solid #000;
    display: flex;
    align-items: stretch;
    padding: 0;
    flex-shrink: 0;
}
.mbtn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    padding: 0 12px;
    cursor: default;
    display: flex; align-items: center;
}
.mbtn:hover, .mbtn.active { background: #000; color: #fff; }
.mitem { position: relative; display: flex; }
.drop {
    display: none;
    position: absolute;
    top: 100%; left: 0;
    background: #fff;
    border: 1.5px solid #000;
    box-shadow: 3px 3px 0 #000;
    min-width: 190px;
    flex-direction: column;
    z-index: 200;
}
.drop.open { display: flex; }
.drop button {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    padding: 5px 16px 5px 20px;
    text-align: left;
    cursor: default;
    display: flex;
    justify-content: space-between;
    gap: 20px;
    white-space: nowrap;
}
.drop button:hover { background: #000; color: #fff; }
.sep { height: 1px; background: #000; margin: 2px 0; opacity: 0.3; }

/* Área de rolagem */
#scroll-area {
    flex: 1;
    overflow-y: auto;
    background-image: repeating-conic-gradient(#ccc 0% 25%, #ddd 0% 50%);
    background-size: 4px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 40px;
}

/* Página A4 */
#page {
    width: 21cm;
    max-width: 96%;
    min-height: 29.7cm;
    background: #fff;
    border: 1px solid #999;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.25);
}
#editor {
    padding: 2.5cm 2.5cm 2.5cm 2.0cm;
    min-height: 29.7cm;
    outline: none;
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-wrap: break-word;
    caret-color: #000;
}

/* Barra de status */
#statusbar {
    height: 18px;
    border-top: 1px solid #000;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 12px;
    font-size: 11px;
    flex-shrink: 0;
}
.sdiv { width: 1px; height: 11px; background: #aaa; }

/* Modal */
#modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    align-items: center; justify-content: center;
    z-index: 500;
}
#mbox {
    background: #fff;
    border: 2px solid #000;
    box-shadow: 4px 4px 0 #000;
    width: 320px;
    font-family: inherit;
}
#mbox-title {
    height: 22px;
    border-bottom: 1px solid #000;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 12px;
    position: relative;
}
#mbox-title::before, #mbox-title::after {
    content: '';
    position: absolute;
    top: 3px; bottom: 3px;
    width: calc(50% - 45px);
    background: repeating-linear-gradient(180deg,#000 0px,#000 1px,#fff 1px,#fff 2px);
}
#mbox-title::before { left: 8px; }
#mbox-title::after  { right: 8px; }
#mbox-title span { background:#fff; padding:0 8px; z-index:1; }
#mbox-body { padding: 18px 20px 12px; text-align: center; line-height: 1.9; }
#mbox-body .app-name { font-size: 16px; font-weight: bold; margin-bottom: 2px; }
#mbox-body .version  { font-size: 11px; color: #666; margin-bottom: 10px; }
#mbox-body p { font-size: 12px; }
#mbox-footer { padding: 8px 16px 14px; display:flex; justify-content:center; border-top: 1px solid #ddd; }
#mclose {
    background: #fff; border: 2px solid #000;
    font-family: inherit; font-size: 12px;
    padding: 3px 28px; cursor: default;
    box-shadow: 2px 2px 0 #000;
}
#mclose:active { background:#000; color:#fff; }

/* Toast */
#_t {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    background: #000; color: #fff;
    font-family: inherit; font-size: 11px;
    padding: 4px 16px; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 999;
    border: 1px solid #000;
}
</style>
</head>
<body>

<div id="window">
    <div id="titlebar">
        <div id="closebtn" onmousedown="fin(event)">&#9632;</div>
        <span>Scriptum &#8212; <span id="fname">sem t&iacute;tulo</span></span>
    </div>

    <div id="menubar">
        <div class="mitem">
            <button class="mbtn" id="bArq">Arquivo</button>
            <div class="drop" id="dArq">
                <button onmousedown="arq(event,'novo')">Novo <small>&#8984;N</small></button>
                <button onmousedown="arq(event,'abrir')">Abrir... <small>&#8984;O</small></button>
                <div class="sep"></div>
                <button onmousedown="arq(event,'salvar')">Salvar <small>&#8984;S</small></button>
                <button onmousedown="arq(event,'salvaras')">Salvar como...</button>
                <div class="sep"></div>
                <button onmousedown="arq(event,'sobre')">Sobre o Scriptum...</button>
            </div>
        </div>
        <div class="mitem">
            <button class="mbtn" id="bEdt">Editar</button>
            <div class="drop" id="dEdt">
                <button onmousedown="edt(event,'desfazer')">Desfazer <small>&#8984;Z</small></button>
                <button onmousedown="edt(event,'refazer')">Refazer <small>&#8984;Y</small></button>
                <div class="sep"></div>
                <button onmousedown="edt(event,'copiar')">Copiar <small>&#8984;C</small></button>
                <button onmousedown="edt(event,'colar')">Colar <small>&#8984;V</small></button>
                <button onmousedown="edt(event,'sel')">Selecionar tudo <small>&#8984;A</small></button>
                <div class="sep"></div>
                <button onmousedown="edt(event,'dark')">Modo escuro</button>
                <button onmousedown="edt(event,'full')">Tela cheia <small>&#8984;F</small></button>
            </div>
        </div>
        <button class="mbtn" onmousedown="fin(event)">Fechar</button>
    </div>

    <div id="scroll-area">
        <div id="page">
            <div id="editor" contenteditable="true" spellcheck="false"></div>
        </div>
    </div>

    <div id="statusbar">
        <span id="wc">0 palavras</span>
        <div class="sdiv"></div>
        <span id="chars">0 caracteres</span>
        <div class="sdiv"></div>
        <span id="saved">&#10003; salvo</span>
    </div>
</div>

<input type="file" id="finput" accept=".txt,.md" style="display:none">
<div id="_t"></div>

<div id="modal">
    <div id="mbox">
        <div id="mbox-title"><span>Sobre o Scriptum</span></div>
        <div id="mbox-body">
            <p class="app-name">Scriptum</p>
            <p class="version">Editor Minimalista &mdash; v1.0</p>
            <div class="sep"></div>
            <p><b>Prof. Adagenor Lobato Ribeiro</b></p>
            <p>Universidade Federal do Par&aacute;</p>
            <p>N&uacute;cleo de Altos Estudos Amaz&ocirc;nicos</p>
            <p>Faculdade de Computa&ccedil;&atilde;o &mdash; ICEN</p>
        </div>
        <div id="mbox-footer">
            <button id="mclose" onmousedown="fechaModal(event)">OK</button>
        </div>
    </div>
</div>

<script>
var ed    = document.getElementById('editor');
var wcEl  = document.getElementById('wc');
var chEl  = document.getElementById('chars');
var fnEl  = document.getElementById('fname');
var svEl  = document.getElementById('saved');
var dArq  = document.getElementById('dArq');
var dEdt  = document.getElementById('dEdt');
var bArq  = document.getElementById('bArq');
var bEdt  = document.getElementById('bEdt');
var nome  = 'sem-titulo.txt';
var ssel  = null;
var timer;

window.onload = function() {
    var s = localStorage.getItem('scriptum_data');
    if (s) { ed.innerText = s; stats(); }
    ed.focus();
};

ed.addEventListener('input', function() {
    clearTimeout(timer);
    stats();
    svEl.innerText = '...';
    timer = setTimeout(function() { salvaLocal(); svEl.innerText = '\u2713 salvo'; }, 5000);
});

function salvaLocal() {
    localStorage.setItem('scriptum_data', ed.innerText);
}

function stats() {
    var t = ed.innerText.trim();
    var w = t ? t.split(/\s+/).length : 0;
    var c = ed.innerText.replace(/\n/g,'').length;
    wcEl.innerText = w + (w === 1 ? ' palavra' : ' palavras');
    chEl.innerText = c + ' caracteres';
}

ed.addEventListener('mouseup', ss);
ed.addEventListener('keyup',   ss);
ed.addEventListener('blur',    ss);
function ss() { var s=window.getSelection(); if(s&&s.rangeCount) ssel=s.getRangeAt(0).cloneRange(); }
function rs() { ed.focus(); if(ssel){var s=window.getSelection();s.removeAllRanges();s.addRange(ssel);} }

// Dropdowns
bArq.addEventListener('mousedown', function(e) {
    e.preventDefault();
    bArq.classList.toggle('active');
    dEdt.classList.remove('open'); bEdt.classList.remove('active');
    dArq.classList.toggle('open');
});
bEdt.addEventListener('mousedown', function(e) {
    e.preventDefault();
    bEdt.classList.toggle('active');
    dArq.classList.remove('open'); bArq.classList.remove('active');
    dEdt.classList.toggle('open');
});
document.addEventListener('mousedown', function(e) {
    if (!bArq.contains(e.target)&&!dArq.contains(e.target)) { dArq.classList.remove('open'); bArq.classList.remove('active'); }
    if (!bEdt.contains(e.target)&&!dEdt.contains(e.target)) { dEdt.classList.remove('open'); bEdt.classList.remove('active'); }
});

// Menu Arquivo
function arq(e, cmd) {
    e.preventDefault();
    dArq.classList.remove('open'); bArq.classList.remove('active');

    if (cmd === 'novo') {
        if (ed.innerText.trim() && !confirm('Criar novo documento?\nO texto atual sera perdido.')) return;
        ed.innerText = '';
        nome = 'sem-titulo.txt';
        fnEl.innerText = 'sem titulo';
        stats(); ed.focus();
        toast('Novo documento.');

    } else if (cmd === 'abrir') {
        if (window.showOpenFilePicker) {
            window.showOpenFilePicker({
                types: [{ description: 'Texto', accept: { 'text/plain': ['.txt', '.md'] } }],
                multiple: false
            }).then(function(handles) {
                var h = handles[0];
                h.getFile().then(function(f) {
                    f.text().then(function(txt) {
                        ed.innerText = txt;
                        nome = h.name;
                        fnEl.innerText = h.name;
                        stats(); ed.focus();
                        toast('Aberto: ' + h.name);
                    });
                });
            }).catch(function(err) {
                if (err.name !== 'AbortError') toast('Erro: ' + err.message);
            });
        } else {
            document.getElementById('finput').click();
        }

    } else if (cmd === 'salvar') {
        salvaLocal();
        dl(nome);

    } else if (cmd === 'salvaras') {
        var n = prompt('Nome do arquivo:', nome);
        if (!n) return;
        n = n.trim();
        if (n.indexOf('.') === -1) n += '.txt';
        nome = n;
        fnEl.innerText = n;
        salvaLocal();
        dl(nome);

    } else if (cmd === 'sobre') {
        document.getElementById('modal').style.display = 'flex';
    }
}

// Menu Editar
function edt(e, cmd) {
    e.preventDefault();
    dEdt.classList.remove('open'); bEdt.classList.remove('active');

    if (cmd === 'desfazer') {
        ed.focus(); document.execCommand('undo'); stats();
    } else if (cmd === 'refazer') {
        ed.focus(); document.execCommand('redo'); stats();
    } else if (cmd === 'copiar') {
        rs();
        var txt = window.getSelection().toString();
        if (txt) {
            navigator.clipboard.writeText(txt)
                .then(function() { toast('Copiado.'); })
                .catch(function() { document.execCommand('copy'); toast('Copiado.'); });
        } else { toast('Selecione um trecho primeiro.'); }
    } else if (cmd === 'colar') {
        rs();
        navigator.clipboard.readText().then(function(txt) {
            var sel = window.getSelection(); if (!sel.rangeCount) return;
            var r = sel.getRangeAt(0); r.deleteContents();
            var node = document.createTextNode(txt); r.insertNode(node);
            r.setStartAfter(node); r.setEndAfter(node);
            sel.removeAllRanges(); sel.addRange(r);
            ssel = r.cloneRange(); stats(); toast('Colado.');
        }).catch(function() { toast('Use Cmd+V para colar.'); });
    } else if (cmd === 'sel') {
        ed.focus();
        var r = document.createRange(); r.selectNodeContents(ed);
        var s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
        ssel = r.cloneRange(); toast('Tudo selecionado.');
    } else if (cmd === 'dark') {
        document.body.classList.toggle('dark-mode');
        var dm = document.body.classList.contains('dark-mode');
        document.getElementById('window').style.background = dm ? '#1a1a1a' : '';
        document.getElementById('page').style.background   = dm ? '#222' : '#fff';
        document.getElementById('page').style.borderColor  = dm ? '#444' : '#999';
        ed.style.color = dm ? '#e0e0e0' : '#000';
        ed.style.caretColor = dm ? '#bb86fc' : '#000';
    } else if (cmd === 'full') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }
}

// Fechar
function fin(e) {
    if (e) e.preventDefault();
    if (confirm('Fechar o Scriptum?\nO texto sera salvo automaticamente.')) {
        salvaLocal(); window.close();
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;font-size:12px;">Sessao encerrada.</div>';
    }
}

// Download
function dl(n) {
    var b = new Blob([ed.innerText], { type: 'text/plain;charset=utf-8' });
    var u = URL.createObjectURL(b);
    var a = document.createElement('a');
    a.href = u; a.download = n;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(u);
    toast('Salvo: ' + n);
    svEl.innerText = '\u2713 salvo';
}

// Modal
function fechaModal(e) {
    if (e) e.preventDefault();
    document.getElementById('modal').style.display = 'none';
    ed.focus();
}
document.getElementById('modal').addEventListener('mousedown', function(e) {
    if (e.target.id === 'modal') fechaModal(e);
});

// Abrir fallback
document.getElementById('finput').addEventListener('change', function(e) {
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
        ed.innerText = ev.target.result;
        nome = f.name; fnEl.innerText = f.name;
        stats(); ed.focus(); toast('Aberto: ' + f.name);
    };
    r.readAsText(f); e.target.value = '';
});

// Toast
function toast(msg) {
    var t = document.getElementById('_t');
    t.innerText = msg; t.style.opacity = '.95';
    clearTimeout(t._t);
    t._t = setTimeout(function() { t.style.opacity = '0'; }, 2200);
}

// Atalhos
document.addEventListener('keydown', function(e) {
    var mod = e.metaKey || e.ctrlKey;
    if (mod && e.key === 'n') { e.preventDefault(); arq(e, 'novo'); }
    if (mod && e.key === 'o') { e.preventDefault(); arq(e, 'abrir'); }
    if (mod && e.key === 's') { e.preventDefault(); arq(e, 'salvar'); }
    if (mod && e.key === 'f') { e.preventDefault(); edt(e, 'full'); }
});

// Colar puro
ed.addEventListener('paste', function(e) {
    e.preventDefault();
    var txt = e.clipboardData.getData('text/plain');
    var sel = window.getSelection(); if (!sel.rangeCount) return;
    var r = sel.getRangeAt(0); r.deleteContents();
    var node = document.createTextNode(txt); r.insertNode(node);
    r.setStartAfter(node); r.setEndAfter(node);
    sel.removeAllRanges(); sel.addRange(r); stats();
});
</script>
</body>
</html>
